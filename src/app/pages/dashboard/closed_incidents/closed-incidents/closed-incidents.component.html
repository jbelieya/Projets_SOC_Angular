<div class="card-container p-4" style="background-color: var(--sys-surface-container-low); border-radius: 16px; border: 1px solid var(--sys-outline-variant);">
  
  <div class="flex justify-between items-center mb-6">
    <h3 class="text-sm font-bold uppercase tracking-wider" style="color: var(--sys-on-surface-variant);">
      Open Incidents <span class="ml-2 text-[10px] opacity-50">Trend</span>
    </h3>
    
    <div class="flex bg-black/20 p-1 rounded-xl border border-white/5">
      <button (click)="toggleType('month')" 
              [class.active]="currentType === 'month'"
              class="btn-nav">Month</button>
      <button (click)="toggleType('year')" 
              [class.active]="currentType === 'year'"
              class="btn-nav">Year</button>
    </div>
  </div>

  <div class="h-[250px]">
    <canvas #chart></canvas>
  </div>
</div>
