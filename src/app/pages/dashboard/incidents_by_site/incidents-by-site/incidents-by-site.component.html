<div class="card-container p-4" style="background-color: var(--sys-surface-container-low); border-radius: 20px; border: 1px solid var(--sys-outline-variant);">
  
  <div class="flex justify-between items-center mb-6">
    <div>
      <h3 class="text-xs font-black uppercase tracking-widest opacity-60" style="color: var(--sys-on-surface);">Global Reach</h3>
      <h2 class="text-lg font-bold" style="color: var(--sys-primary);">Incidents by Site</h2>
    </div>

    <div class="flex bg-zinc-900/50 p-1 rounded-lg border border-white/5">
      <button (click)="toggleType('month')" [class.active]="currentType === 'month'" class="nav-btn">Month</button>
      <button (click)="toggleType('year')" [class.active]="currentType === 'year'" class="nav-btn">Year</button>
    </div>
  </div>

  <div class="h-[300px]">
    <canvas #chart></canvas>
  </div>
</div>
