  
  <div class="lbl">False / True positive</div>

  <div class="donut-wrap">
    <svg width="100" height="100" viewBox="0 0 72 72">
      <circle cx="36" cy="36" r="24" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="10"/>
      <circle cx="36" cy="36" r="24" fill="none" stroke="#3b82f6" stroke-width="10" 
              [attr.stroke-dasharray]="truePercentage() + ' ' + (150.8 - truePercentage())" 
              stroke-dashoffset="38" stroke-linecap="round"/>
      <text x="36" y="40" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">
        {{ truePercentageLabel() }}%
      </text>
    </svg>

    <div class="leg">
      <div class="leg-item">
        <div class="dot" style="background:#3b82f6"></div>
        True positive — {{ truePercentageLabel() }}%
      </div>
      <div class="leg-item">
        <div class="dot" style="background:#a78bfa"></div>
        False positive — {{ falsePercentageLabel() }}%
      </div>
    </div>
  </div>

  <div class="mini-cards">
    <div class="mini-card">
      <div class="mini-lbl">true</div>
      <div class="mini-val" style="color:#7ab4f5">{{ totalTrue() }}</div>
    </div>
    <div class="mini-card">
      <div class="mini-lbl">false</div>
      <div class="mini-val" style="color:#c4b5fd">{{ totalFalse() }}</div>
    </div>
  </div>

 <div class="actions-footer">
  <div class="toggle-group">
    <button (click)="toggleType('month')" [class.active]="currentType === 'month'">
      Mois
    </button>
    <button (click)="toggleType('year')" [class.active]="currentType === 'year'">
      Année
    </button>
  </div>
</div>
