<button (click)="toggleChat()" class="fixed bottom-6 right-6 bg-blue-600 text-white w-14 h-14 rounded-full shadow-2xl z-50 hover:scale-110 transition flex items-center justify-center">
  <span *ngIf="!isOpen" class="text-2xl">🤖</span>
  <span *ngIf="isOpen" class="text-xl text-white">✖</span>
</button>

<div *ngIf="isOpen" class="fixed bottom-24 right-6 w-96 h-[500px] bg-white border rounded-2xl shadow-2xl flex flex-col z-50 overflow-hidden animate-bounce-in">
  <div class="p-4 bg-blue-600 text-white font-bold flex justify-between items-center">
    <span>SOC AI Assistant</span>
    <span class="text-[10px] bg-blue-400 px-2 py-1 rounded">Ollama</span>
  </div>
  
  <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50">
    <div *ngFor="let m of messages" [ngClass]="m.isAi ? 'justify-start' : 'justify-end'" class="flex">
      <span [ngClass]="m.isAi ? 'bg-white text-gray-800 border' : 'bg-blue-600 text-white'" 
            class="inline-block p-3 rounded-2xl shadow-sm max-w-[85%] text-sm">
        {{ m.text }}
      </span>
    </div>
    <div *ngIf="isLoading" class="text-xs text-gray-400 italic">L'IA réfléchit...</div>
  </div>

  <div class="p-3 border-t bg-white flex gap-2">
    <input [(ngModel)]="userInput" (keyup.enter)="sendMessage()" 
           class="flex-1 border rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500" 
           placeholder="Posez une question...">
    <button (click)="sendMessage()" class="bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700">
      <i class="fas fa-paper-plane"></i> Send
    </button>
  </div>
</div>
