<div class="options-header">
    <button mat-icon-button class="remove-button" (click)="store.removeWidget(data().id)" title="Remove">
        <mat-icon>delete</mat-icon>
    </button>
    <button mat-icon-button class="close-button" (click)="showOptions.set(false)">
        <mat-icon>close</mat-icon>
    </button>
</div>

<div class="scroll-content">
    <div class="option-row">
        <span>Width (Columns)</span>
        <mat-button-toggle-group [value]="data().columns ?? 1"
            (change)="store.updateWidget(data().id,{columns: +$event.value})">
            <mat-button-toggle [value]="1">1</mat-button-toggle>
            <mat-button-toggle [value]="2">2</mat-button-toggle>
            <mat-button-toggle [value]="3">3</mat-button-toggle>
            <mat-button-toggle [value]="4">4</mat-button-toggle>
        </mat-button-toggle-group>
    </div>

    <div class="option-row">
        <span>Height (Rows)</span>
        <mat-button-toggle-group [value]="data().rows ?? 1"
            (change)="store.updateWidget(data().id,{rows: +$event.value})">
            <mat-button-toggle [value]="1">1</mat-button-toggle>
            <mat-button-toggle [value]="2">2</mat-button-toggle>
            <mat-button-toggle [value]="3">3</mat-button-toggle>
            <mat-button-toggle [value]="4">4</mat-button-toggle>
        </mat-button-toggle-group>
    </div>

    <div class="option-row">
        <span>Months Range</span>
        <mat-form-field appearance="outline" subscriptSizing="dynamic">
            <mat-select [value]="data().moin" multiple (selectionChange)="store.updateWidget(data().id, { moin: $event.value })">
                @for (m of monthsList; track m.value) {
                    <mat-option [value]="m.value">{{ m.viewValue }}</mat-option>
                }
            </mat-select>
        </mat-form-field>
    </div>

    <div class="option-row">
        <span>Years Range</span>
        <mat-form-field appearance="outline" subscriptSizing="dynamic">
            <mat-select [value]="data().year ?? []" multiple (selectionChange)="store.updateWidget(data().id, { year: $event.value })">
                @for (y of yearsList; track y) {
                    <mat-option [value]="y">{{ y }}</mat-option>
                }
            </mat-select>
        </mat-form-field>
    </div>
</div>

<div class="controls-footer">
    <button mat-icon-button class="nav-button" (click)="store.moveWidgetToLeft(data().id)">
        <mat-icon>chevron_left</mat-icon>
    </button>
    <button mat-icon-button class="nav-button" (click)="store.moveWidgetToRight(data().id)">
        <mat-icon>chevron_right</mat-icon>
    </button>
</div>
