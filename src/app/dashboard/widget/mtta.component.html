<div class="flex flex-col">
    <div class="flex items-center gap-2 mt-4 mb-2"> 
        <p class="text-3xl font-bold m-0 val">{{ mtta() }}</p>
        <span class="unit">min</span>
      <mat-icon class="status-icon" [class.safe]="mtta() < 60" [class.warn]="mtta() >= 60">
        {{ mtta() < 60 ? 'check_circle' : 'warning' }}
      </mat-icon>
    </div>

    <div class="sub">
      <svg class="trend-icon" viewBox="0 0 14 14" fill="none">
        <polyline points="1,10 5,5 9,7 13,2" stroke="#34d399" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <span class="up">Avg</span>
      <span class="text">for selected {{ currentType }}s</span>
    </div>
</div>
